<!-- 새 사용자가 회원가입할 수 있는 폼 템플릿입니다. -->
{% extends "base.html" %}

{% block title %}회원가입 - WriteUp{% endblock %}

{% block content %}
<!-- 회원가입 입력 영역: 아이디와 비밀번호를 입력받아 계정을 생성합니다. -->
<section class="form-wrap">
    <div class="form-card small-card">
        <h1>회원가입</h1>

        <form method="POST" class="write-form">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" required>

            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required>

            <label for="password_confirm">비밀번호 확인</label>
            <input type="password" id="password_confirm" name="password_confirm" required>

            <button type="submit" class="btn btn-primary btn-full">회원가입</button>
        </form>
    </div>
</section>
{% endblock %}
