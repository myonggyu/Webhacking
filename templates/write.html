<!-- 로그인한 사용자가 새 게시글을 작성하는 폼 템플릿입니다. -->
{% extends "base.html" %}

{% block title %}글쓰기 - WriteUp{% endblock %}

{% block content %}
<!-- 게시글 작성 영역: 제목과 내용을 입력받아 저장합니다. -->
<section class="form-wrap">
    <div class="form-card">
        <h1>새 글 작성하기</h1>

        <form method="POST" class="write-form">
            <label for="title">제목</label>
            <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required>

            <label for="content">내용</label>
            <textarea id="content" name="content" rows="12" placeholder="내용을 입력하세요" required></textarea>

            <button type="submit" class="btn btn-primary btn-full">작성 완료</button>
        </form>
    </div>
</section>
{% endblock %}
