<!-- 기존 사용자가 로그인할 수 있는 폼 템플릿입니다. -->
{% extends "base.html" %}

{% block title %}로그인 - WriteUp{% endblock %}

{% block content %}
<!-- 로그인 입력 영역: 아이디와 비밀번호를 받아 인증합니다. -->
<section class="form-wrap">
    <div class="form-card small-card">
        <h1>로그인</h1>

        <form method="POST" class="write-form">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" required>

            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="btn btn-primary btn-full">로그인</button>
        </form>
    </div>
</section>
{% endblock %}
