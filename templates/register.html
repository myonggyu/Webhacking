{% extends 'base.html' %}
{% block title %}회원가입 — WriteUp{% endblock %}
{% block content %}

<div class="form-page">
  <div class="form-box">
    <span class="form-box-logo">WriteUp</span>
    <h2>함께해요</h2>
    <p class="form-sub">계정을 만들고 커뮤니티에 참여하세요.</p>

    <form method="POST">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" name="username" placeholder="사용할 아이디를 입력하세요" required autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
      </div>
      <button type="submit" class="btn-submit">가입하기</button>
    </form>

    <p class="form-footer">
      이미 계정이 있으신가요? <a href="{{ url_for('auth.login') }}">로그인</a>
    </p>
  </div>
</div>

{% endblock %}
